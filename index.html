<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐹可愛養老鼠遊戲🌻</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            margin: 0;
            padding: 0;
            background: #f7ede2;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        #ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 9999;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(139, 94, 60, 0.15);
            border: 2px solid #f2cc8f;
            width: 280px;
        }
        h3 {
            margin: 0 0 12px 0;
            color: #6d6875;
            font-size: 18px;
            text-align: center;
            border-bottom: 2px dashed #f2cc8f;
            padding-bottom: 8px;
        }
        .btn-group {
            display: block;
        }
        button {
            display: block;
            width: 100%;
            background: #f4a261;
            border: none;
            padding: 10px 15px;
            margin: 8px 0;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            color: #ffffff;
            font-size: 14px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 0 #e76f51;
            text-align: center;
        }
        button:hover {
            background: #ffb703;
            box-shadow: 0 4px 0 #fb8500;
            transform: translateY(-1px);
        }
        button:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #fb8500;
        }
        #btn-mute {
            background: #e9c46a;
            color: #6d6875;
            box-shadow: 0 4px 0 #dda15e;
        }
        #btn-skin {
            background: #a8dadc;
            color: #1d3557;
            box-shadow: 0 4px 0 #457b9d;
        }
        #btn-skin:hover {
            background: #457b9d;
            color: white;
            box-shadow: 0 4px 0 #1d3557;
        }
        #btn-clear {
            background: #e63946;
            box-shadow: 0 4px 0 #b7094c;
        }
        #btn-clear:hover {
            background: #ff4d6d;
            box-shadow: 0 4px 0 #c9184a;
        }
        #btn-clear:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #c9184a;
        }
        .tip {
            font-size: 12px;
            color: #abc4ff;
            background: #e6e9f0;
            color: #6d6875;
            padding: 8px;
            border-radius: 8px;
            margin-top: 12px;
            line-height: 1.4;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
        }
        .cage-bars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.03;
            background: linear-gradient(90deg, #000 50%, transparent 50%);
            background-size: 40px 100%;
            z-index: 1;
        }

        /* ==================== 方案 B：純 CSS 倉鼠外觀 ==================== */
        #css-hamster {
            position: absolute;
            width: 80px;
            height: 60px;
            pointer-events: none; 
            z-index: 5;
            transform-origin: center;
            transition: transform 0.15s ease-out; /* 讓轉向與動作過渡更平滑柔和 */
        }
        
        .skin-default {
            width: 100%;
            height: 100%;
            background: #ffffff;
            border-radius: 42px / 32px;
            border: 2px solid #e5e5e5;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            position: relative;
        }
        .ear {
            position: absolute;
            width: 18px;
            height: 18px;
            background: #ffccd5;
            border: 3px solid #ffffff;
            border-radius: 50%;
            top: -6px;
        }
        .ear.left { left: 12px; }
        .ear.right { right: 12px; }
        .eye {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #333333; /* 修正完成：已補上冒號 */
            border-radius: 50%;
            top: 18px;
        }
        .eye.left { left: 16px; }
        .eye.right { right: 42px; }
        .blush {
            position: absolute;
            width: 12px;
            height: 6px;
            background: #ffb6c1;
            border-radius: 50%;
            top: 26px;
            opacity: 0.6;
        }
        .blush.left { left: 10px; }
        .blush.right { right: 34px; }
        .nose {
            position: absolute;
            width: 6px;
            height: 5px;
            background: #ffb6c1;
            border-radius: 50%;
            top: 24px;
            left: 4px;
        }
        .tail {
            position: absolute;
            width: 10px;
            height: 6px;
            background: #ffccd5;
            border-radius: 3px;
            right: -4px;
            bottom: 12px;
            transform: rotate(15deg);
        }

        .skin-realistic {
            width: 110px; 
            height: 80px;
            background: url('hamster.png') no-repeat center center;
            background-size: contain;
            position: absolute;
            top: -10px;
            left: -15px;
        }

        .css-seed {
            position: absolute;
            width: 24px;
            height: 36px;
            background: linear-gradient(135deg, #4a4e69 0%, #22223b 100%);
            border-radius: 50% 50% 50% 50% / 70% 70% 30% 30%;
            border: 2px solid #111;
            pointer-events: none;
            z-index: 4;
            transform-origin: center;
        }
        .css-seed::before {
            content: '';
            position: absolute;
            left: 10px;
            top: 2px;
            width: 2px;
            height: 30px;
            background: #f2cc8f;
            opacity: 0.7;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body>

    <div class="cage-bars"></div>

    <div id="ui-panel">
        <h3>🐹可愛老鼠房間</h3>
        <div class="btn-group">
            <button id="btn-wood">🪵倒木屑</button>
            <button id="btn-food">🌻吃飯</button>
            <button id="btn-toy">⚽ 可愛小玩具</button>
            <button id="btn-skin">👕 切換老鼠形象</button>
            <button id="btn-mute">🔊 讓老鼠閉嘴</button>
            <button id="btn-clear">🧹全部蛋雕</button>
        </div>
        <div class="tip">
            💡 <b>可愛老鼠指南：</b><br>
            不咬人但亂跑亂跳<br>
            • 跟你<b>打招呼</b>要回<br>
            • 他喜歡吃飯跟窩在木屑裡<br>
        </div>
    </div>

    <div id="css-hamster">
        <div id="hamster-render-target" class="skin-default">
            <div class="ear left"></div>
            <div class="ear right"></div>
            <div class="eye left"></div>
            <div class="eye right"></div>
            <div class="blush left"></div>
            <div class="blush right"></div>
            <div class="nose"></div>
            <div class="tail"></div>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script src="script.js"></script>
</body>
</html>
